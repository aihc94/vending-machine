services:
  api:
    image: php84-fpm:dev
    container_name: api
    volumes:
      - ./api:/var/www
      - ./api/docker/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini:ro
      - vendor_api:/var/www/vendor
    networks:
      - inner_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh ./docker/start.sh

  public:
    image: php84-fpm:dev
    container_name: public
    volumes:
      - ./public:/var/www
      - ./public/docker/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini:ro
      - vendor_public:/var/www/vendor
    networks:
      - inner_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh ./docker/start.sh

  router:
    image: nginx:alpine
    container_name: router
    ports:
      - "80:80"
      - "8081:8081"
    volumes:
      - ./router/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./public/public/js:/var/www/public/js
      - ./public/public/css:/var/www/public/css
      - ./public/public/images:/var/www/public/images
    depends_on:
      - public
      - api
    networks:
      - inner_network

  database:
    image: mongo:7
    container_name: database
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: notYourProblem
      MONGO_INITDB_DATABASE: app_db
    volumes:
      - mongo_data:/data/db
    networks:
      - inner_network

volumes:
  mongo_data:
  vendor_public:
  vendor_api:

networks:
  inner_network:
    driver: bridge
